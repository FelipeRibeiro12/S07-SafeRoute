services:
  # Database
  postgres-db:
    image: postgres:15
    container_name: alert-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: America/Sao_Paulo
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Infra
  config-server:
    build: ./services/config-server
    container_name: config-server
    ports:
      - "8888:8888"
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Service Discovery
  eureka-server:
    build: ./services/eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    restart: on-failure
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Services
  api-gateway:
    build: ./services/api-gateway
    container_name: api-gateway
    restart: on-failure
    ports:
      - "8080:8080"
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  sensor-service:
    build: ./services/sensor-service
    container_name: sensor-service
    restart: on-failure
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  alert-service:
    build: ./services/alert-service
    container_name: alert-service
    restart: on-failure
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/${POSTGRES_DB}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - TZ=America/Sao_Paulo
    depends_on:
      config-server:
        condition: service_healthy
      postgres-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  # CI/CD
  mailhog:
    image: mailhog/mailhog:latest
    container_name: saferoute-mailhog
    ports:
      - "8025:8025"
      - "1025:1025"

  jenkins:
    build:
      context: ./jenkins
      dockerfile: Dockerfile
    container_name: saferoute-jenkins
    ports:
      - "8090:8080"
      - "50000:50000"
    volumes:
      - jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - JENKINS_ADMIN_ID=${JENKINS_ADMIN_ID:-admin}
      - JENKINS_ADMIN_PASSWORD=${JENKINS_ADMIN_PASSWORD:-admin}
      - NOTIFY_EMAIL=${NOTIFY_EMAIL:-ci@saferoute.local}
      - REPO_URL=${REPO_URL}
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
    depends_on:
      - mailhog

volumes:
  postgres-data:
  jenkins-data:
